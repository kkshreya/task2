<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Calculator</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
    }

    .calculator {
        background: #222;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        width: 300px;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #000;
        color: #0f0;
        font-size: 24px;
        padding: 10px;
        text-align: right;
        border-radius: 10px;
        margin-bottom: 15px;
        overflow-x: auto;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .operator {
        background: #ff9500;
        color: white;
    }

    .equal {
        background: #28a745;
        color: white;
        grid-column: span 2;
    }

    .clear {
        background: #dc3545;
        color: white;
    }

    .number {
        background: #444;
        color: white;
    }

    @media (max-width: 400px) {
        .calculator {
            width: 90%;
        }
    }
</style>
</head>

<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    // Append input
    function append(value) {
        if (display.innerText === "0") {
            display.innerText = value;
        } else {
            display.innerText += value;
        }
    }

    // Clear display
    function clearDisplay() {
        display.innerText = "0";
    }

    // Delete last character
    function deleteLast() {
        display.innerText = display.innerText.slice(0, -1) || "0";
    }

    // Calculate result
    function calculate() {
        try {
            display.innerText = eval(display.innerText);
        } catch {
            display.innerText = "Error";
        }
    }

    // Keyboard support
    document.addEventListener("keydown", function(event) {
        const key = event.key;

        if (!isNaN(key) || "+-*/.".includes(key)) {
            append(key);
        } else if (key === "Enter") {
            calculate();
        } else if (key === "Backspace") {
            deleteLast();
        } else if (key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
